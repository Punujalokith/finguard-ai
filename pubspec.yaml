name: finguard_ai
description: "FinGuard AI - Personal Financial Digital Twin and Intelligent Decision Support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # UI / Charts
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1

  # Local Storage
  shared_preferences: ^2.3.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  http: ^1.2.2

  # Security & Biometrics
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Voice input
  speech_to_text: 7.4.0

  # Icons
  font_awesome_flutter: ^10.8.0

  # Sharing / Export
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6C5CE7"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
